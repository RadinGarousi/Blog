{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" sizes="16x16" type="image/png" href="{% static 'icons/favicon/logo-16x16.png' %}">
    <link rel="icon" sizes="32x32" type="image/png" href="{% static 'icons/favicon/logo-32x32.png' %}">
    <link rel="icon" sizes="48x48" type="image/png" href="{% static 'icons/favicon/logo-48x48.png' %}">
    <link rel="icon" sizes="192x192" type="image/png" href="{% static 'icons/favicon/logo-192x192.png' %}">
    <link rel="apple-touch-icon" href="{% static 'icons/favicon/apple-touch-icon.png' %}">
    <link rel="icon" sizes="512x512" type="image/png" href="{% static 'icons/favicon/logo-512x512.png' %}">
    <title>Blog</title>
    <link rel="stylesheet" href="{% static 'css/reset.css' %}">
    <link rel="stylesheet" href="{% static 'css/grid.css' %}">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/components.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
