{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GoldBlog | {% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="icon" sizes="16x16" type="image/png" href="{% static 'favicon/logo-16x16.png' %}">
    <link rel="icon" sizes="32x32" type="image/png" href="{% static 'favicon/logo-32x32.png' %}">
    <link rel="icon" sizes="48x48" type="image/png" href="{% static 'favicon/logo-48x48.png' %}">
    <link rel="icon" sizes="192x192" type="image/png" href="{% static 'favicon/logo-192x192.png' %}">
    <link rel="apple-touch-icon" href="{% static 'favicon/apple-touch-icon.png' %}">
    <link rel="icon" sizes="512x512" type="image/png" href="{% static 'favicon/logo-512x512.png' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
